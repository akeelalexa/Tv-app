<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر تطبيقات Android TV</title>
    <style>
        :root {
            --primary-color: #00ff88; 
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-dark); 
            color: white; 
            text-align: center; 
            margin: 0;
            padding: 20px;
        }

        h1 { color: var(--primary-color); margin-top: 20px; font-size: 2.2em; }
        .subtitle { color: #888; margin-bottom: 40px; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; 
            max-width: 1000px; 
            margin: auto; 
        }

        .card { 
            background: var(--card-bg); 
            border: 1px solid #333; 
            border-radius: 20px; 
            padding: 30px 20px; 
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card:hover { 
            border-color: var(--primary-color); 
            transform: translateY(-8px);
            box-shadow: 0 10px 20px rgba(0, 255, 136, 0.1);
        }

        /* تنسيق أيقونة التطبيق */
        .app-img {
            width: 100px; /* زيادة الحجم قليلاً للتوضيح */
            height: 100px;
            margin-bottom: 15px;
            object-fit: contain; /* لضمان عدم اقتصاص الأيقونة */
            /* لم تعد الخلفية البيضاء أو الحدود السوداء ضرورية */
        }

        .card h3 { margin: 10px 0; font-size: 1.5em; color: #fff; }
        .card p { color: #aaa; font-size: 0.95em; line-height: 1.6; margin-bottom: 20px; height: 50px; }

        .btn { 
            display: block; 
            width: 85%;
            background: var(--primary-color); 
            color: #000; 
            text-decoration: none; 
            padding: 12px; 
            border-radius: 12px; 
            font-weight: bold; 
            transition: 0.3s;
        }

        .btn:hover { 
            background: #fff;
            transform: scale(1.05);
        }

    </style>
</head>
<body>
