<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري الخاص</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1000px; margin: auto; }
        .card { background: #1e1e1e; border: 1px solid #333; border-radius: 15px; padding: 20px; transition: 0.3s; }
        .card:hover { border-color: #00ff88; transform: translateY(-5px); }
        h1 { color: #00ff88; margin-bottom: 30px; }
        .btn { display: block; background: #00ff88; color: #000; text-decoration: none; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <h1>متجر تطبيقات Android TV</h1>
    <div class="grid">
        <div class="card">
            <h3>تطبيق سينمانا</h3>
            <p>أحدث إصدار للشاشات</p>
            <a href="#" class="btn">تحميل APK</a>
        </div>
    </div>
</body>
</html>
