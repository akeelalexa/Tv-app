<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر التطبيقات الذكي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <div class="search-bar">
            <input type="text" placeholder="ابحث عن تطبيق...">
            <span class="search-icon">🔍</span>
        </div>
        
        <nav class="categories">
            <button class="active">الكل</button>
            <button>العراق</button>
            <button>رياضة</button>
            <button>ادوات</button>
            <button>IPTV</button>
            <button>سينما</button>
        </nav>
    </header>

    <main class="app-grid">
        <div class="app-card">
            <div class="app-header">
                <div class="app-info">
                    <img src="https://via.placeholder.com/50" alt="icon" class="app-icon">
                    <div class="app-details">
                        <h3>Cinemana Plus</h3>
                        <p>🇮🇶 العراق</p>
                    </div>
                </div>
                <span class="version-tag">v.8.0.4</span>
            </div>
            <button class="download-btn">📥 تحميل</button>
        </div>

        <div class="app-card">
            <div class="app-header">
                <div class="app-info">
                    <img src="https://via.placeholder.com/50" alt="icon" class="app-icon">
                    <div class="app-details">
                        <h3>1 IRAQ TV</h3>
                        <p>رياضة</p>
                    </div>
                </div>
                <span class="version-tag">v1</span>
            </div>
            <button class="download-btn">📥 تحميل</button>
        </div>

        </main>
</div>

</body>
</html>
