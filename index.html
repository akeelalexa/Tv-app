<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر التطبيقات العصري</title>
    <style>
        /* كود التصميم - CSS */
        :root {
            --bg-color: #0d1117;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-color: #4ade80; 
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .search-bar {
            max-width: 500px;
            margin: 0 auto 25px;
            background: rgba(255,255,255,0.05);
            border-radius: 50px;
            padding: 10px 20px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
        }

        .search-bar input {
            background: none;
            border: none;
            color: white;
            width: 100%;
            outline: none;
            font-size: 16px;
        }

        .categories {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .categories button {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 8px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .categories button.active {
            background: var(--accent-color);
            color: black;
            box-shadow: 0 0 15px var(--accent-color);
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .app-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }

        .app-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .app-info {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .app-icon {
            width: 50px;
            height: 50px;
            background: #1e293b;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .app-details h3 { margin: 0; font-size: 1.1rem; }
        .app-details p { margin: 5px 0 0; color: var(--text-dim); font-size: 0.9rem; }

        .version-tag {
            background: rgba(74, 222, 128, 0.1);
            color: var(--accent-color);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
        }

        .download-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .download-btn:hover {
            background: var(--accent-color);
            color: black;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="search-bar">
